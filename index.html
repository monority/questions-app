<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Culture Quiz - Testez vos connaissances en français! 2250+ questions, multiplayer local, système de progression, niveaux et badges. Jouez seul ou avec vos amis!" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="keywords" content="quiz, français, culture générale, jeu, multiplayer, questions, apprendre" />
    <meta name="author" content="Culture Quiz" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://culture-quiz.app/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://culture-quiz.app/" />
    <meta property="og:title" content="Culture Quiz - Quiz Français Multiplayer" />
    <meta property="og:description" content="Testez vos connaissances en français! 2250+ questions disponibles. Jouez seul ou en multiplayer jusqu'à 8 joueurs!" />
    <meta property="og:image" content="https://culture-quiz.app/og-image.png" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Culture Quiz" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://culture-quiz.app/" />
    <meta name="twitter:title" content="Culture Quiz" />
    <meta name="twitter:description" content="Quiz français multiplayer avec 2250+ questions" />
    <meta name="twitter:image" content="https://culture-quiz.app/og-image.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Structured Data - Quiz Game -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Quiz",
      "name": "Culture Quiz",
      "description": "Quiz de culture générale en français avec 2250+ questions",
      "url": "https://culture-quiz.app/",
      "image": "https://culture-quiz.app/favicon.svg",
      "author": {
        "@type": "Organization",
        "name": "Culture Quiz"
      },
      "applicationCategory": "Game",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "question": [
        {"@type": "Question", "name": "Géographie"},
        {"@type": "Question", "name": "Histoire"},
        {"@type": "Question", "name": "Science"},
        {"@type": "Question", "name": "Arts"}
      ]
    }
    </script>
    
    <title>Culture Quiz - Quiz Français Multiplayer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
